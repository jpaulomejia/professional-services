<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <h2>Professional Services</h2>
      <span>Data &amp; Workforce Solutions</span>
    </div>
    <nav>
      <a href="index.html">🏠 Home</a>
      <a href="workforce.html">💼 Workforce Services</a>
      <a href="school-data.html">📊 School Data Services</a>
      <a href="sis-reporting.html">🏫 SIS &amp; State Reporting</a>
      <a href="contact.html" class="active">✉️ Contact Us</a>
    </nav>
    <div class="sidebar-footer">&copy; 2026 Professional Services</div>
  </aside>

  <main class="main">
    <div class="page-header">
      <h1>✉️ Contact Us</h1>
      <p>Fill out the form below and we'll get back to you shortly</p>
    </div>

    <div class="content-section">
      <form id="contactForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="firstName">First Name *</label>
            <input type="text" id="firstName" name="firstName" required>
          </div>
          <div class="form-group">
            <label for="lastName">Last Name *</label>
            <input type="text" id="lastName" name="lastName" required>
          </div>
          <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="(555) 555-5555">
          </div>
          <div class="form-group full">
            <label for="address">Address</label>
            <input type="text" id="address" name="address" placeholder="City, State">
          </div>
          <div class="form-group full">
            <label for="service">Service Interested In *</label>
            <select id="service" name="service" required>
              <option value="">-- Select a service --</option>
              <option value="Workforce Services">Workforce Services</option>
              <option value="School Data Services">School Data Services</option>
              <option value="SIS & State Reporting">SIS &amp; State Reporting</option>
              <option value="Other">Other / Not Sure Yet</option>
            </select>
          </div>
          <div class="form-group full">
            <label for="message">Message *</label>
            <textarea id="message" name="message" required placeholder="Tell us a bit about what you need..."></textarea>
          </div>
        </div>
        <button type="submit" class="btn-submit">Send Message</button>
        <div id="formMessage" class="form-message"></div>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
